---
- name: apt update
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: apt upgrade
  apt:
    upgrade: dist

- name: Installer des outils
  apt:
    name:
      - curl
      - git
      - htop
    state: present

- name: S'assurer que le fuseau horaire est correct
  timezone:
    name: "Europe/Zurich"


- name: Vérifier si un redémarrage est requis
  stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Redémarrer la VM si nécessaire
  reboot:
    msg: "Redémarrage suite à mise à jour du Kernel via Ansible"
  when: reboot_required_file.stat.exists