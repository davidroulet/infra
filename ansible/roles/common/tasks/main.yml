---
- name: apt update
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: apt upgrade
  apt:
    upgrade: dist

- name: Installer des outils
  apt:
    name:
      - curl
      - git
      - htop
      - tar
    state: present

- name: S'assurer que le fuseau horaire est correct
  timezone:
    name: "Europe/Zurich"

- name: Créer l'utilisateur node_exporter
  user:
    name: node_exporter
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Créer le répertoire temporaire node_exporter
  file:
    path: /tmp/node_exporter_install
    state: directory
    mode: "0755"

- name: Télécharger node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extraire node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/node_exporter_install
    remote_src: yes

- name: Installer le binaire node_exporter
  copy:
    src: /tmp/node_exporter_install/node_exporter-1.8.2.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: yes

- name: Créer le service systemd node_exporter
  copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: Activer et démarrer node_exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: restarted
    daemon_reload: yes

- name: Vérifier si un redémarrage est requis
  stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Redémarrer la VM si nécessaire
  reboot:
    msg: "Redémarrage suite à mise à jour du Kernel via Ansible"
  when: reboot_required_file.stat.exists